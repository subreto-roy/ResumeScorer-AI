{% extends 'analyzer/base.html' %}
{% block title %}Confirm Delete{% endblock %}
 
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 text-center">
            <i class="fas fa-exclamation-triangle text-danger fs-1 mb-3"></i>
            <h5 class="fw-bold">Delete Reference CV?</h5>
            <p class="text-muted">Are you sure you want to delete <strong>{{ object }}</strong>?
            This will also remove all analyses linked to it.</p>
            <form method="post" class="d-flex gap-2 justify-content-center mt-3">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url 'analyzer:reference_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
